<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M&M Crochet</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="imagens/logo.png">
  </head>
  <body>
    <header>
      <div>
        <img src="imagens/logo.png" class="logo" alt="Logo M&M Crochet" />
        <h1>M&M Crochet</h1>
      </div>
      <div>
        <button>Entrar</button>
        <button>Cadastrar-se</button>
      </div>
    </header>

    <nav>
      <a href="#">Início</a>
      <a href="#">Cursos</a>
      <a href="#">Ajuda 24h</a>
      <a href="#">Comunidade</a>
    </nav>

    <section class="hero">
      <h2>Aprenda crochê e gere novas oportunidades</h2>
      <p>Cursos gratuitos, apoio comunitário e geração de renda.</p>
    </section>

    <section class="cursos">
      <div class="card">
        <h3><img src="imagens/polvo.png" alt="" /> Polvo de Crochê</h3>
        <video controls>
          <source src="videos/polvo.mp4" type="video/mp4" />
        </video>
      </div>

      <div class="card">
        <h3><img src="imagens/coracao.png" alt="" /> Coração de Crochê</h3>
        <video controls>
          <source src="videos/coracao.mp4" type="video/mp4" />
        </video>
      </div>
    </section>

    <footer>
      <p>Versão Beta 0.3 - M&M Crochet</p>
    </footer>
  </body>
</html>

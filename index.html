<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M&M Crochet</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <img src="imagens/logo.png" class="logo" alt="Logo M&M Crochet" />
      <h1>M&M Crochet</h1>
      <p>Transformando linhas em oportunidades</p>
    </header>

    <nav>
      <a href="#">Início</a>
      <a href="#">Cursos</a>
      <a href="#">Ajuda 24h</a>
      <a href="#">Comunidade</a>
    </nav>

    <section class="hero">
      <h2>Aprenda Crochê e Gere Novas Oportunidades</h2>
      <p>Cursos gratuitos, apoio comunitário e geração de renda.</p>
    </section>

    <section class="cursos">
      <div class="card">
        <h3>🐙 Polvo de Crochê</h3>
        <video controls>
          <source src="videos/polvo.mp4" type="video/mp4" />
        </video>
      </div>

      <div class="card">
        <h3>❤️ Coração de Crochê</h3>
        <video controls>
          <source src="videos/coracao.mp4" type="video/mp4" />
        </video>
      </div>
    </section>

    <footer>
      <p>Versão Beta 0.2 - M&M Crochet</p>
    </footer>
  </body>
</html>
